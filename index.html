<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPS Test</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

button{
padding:10px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:#38bdf8;
cursor:pointer;
margin-top:15px;
}

input, textarea{
width:80%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

#manualAlamat{
display:none;
margin-top:20px;
}

</style>
</head>

<body>

<h2>Testing Akses Lokasi</h2>

<p id="status">Meminta akses GPS...</p>

<button onclick="requestGPS()">Minta Akses GPS</button>

<div id="manualAlamat">

<h3>Isi Alamat Manual</h3>

<input type="text" id="nama" placeholder="Nama"><br>

<textarea id="alamat" placeholder="Masukkan alamat lengkap"></textarea><br>

<button onclick="kirimAlamat()">Kirim Alamat</button>

</div>

<script>

function requestGPS(){

document.getElementById("status").innerHTML="Meminta akses lokasi...";

navigator.geolocation.getCurrentPosition(

function(position){

let lat = position.coords.latitude;
let lon = position.coords.longitude;

document.getElementById("status").innerHTML =
"GPS Diizinkan ✅<br><br>"+
"Latitude: "+lat+"<br>"+
"Longitude: "+lon;

document.getElementById("manualAlamat").style.display="none";

},

function(error){

if(error.code === 1){

document.getElementById("status").innerHTML =
"❌ Akses GPS ditolak. Silakan isi alamat manual.";

document.getElementById("manualAlamat").style.display="block";

}

if(error.code === 2){
document.getElementById("status").innerHTML="Lokasi tidak tersedia.";
}

if(error.code === 3){
document.getElementById("status").innerHTML="Permintaan lokasi timeout.";
}

}

);

}

function kirimAlamat(){

let nama = document.getElementById("nama").value;
let alamat = document.getElementById("alamat").value;

alert(
"Data Tersimpan\n\n"+
"Nama: "+nama+"\n"+
"Alamat: "+alamat
);

}

window.onload=requestGPS;

</script>

</body>
</html>
